name: sajiloyatra
description: Sajilo Yatra Cinematic Transit
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ✅ Maps & Location - Using Mhj-maps (FREE, no API key)
  mhj_maps: ^1.2.5
  geolocator: ^14.0.2
  url_launcher: ^6.2.5
  # ❌ REMOVED: flutter_map, latlong2, google_maps_flutter (not needed)
  
  # Navigation
  go_router: ^12.1.1
  # # Firebase - ADD THESE
  # firebase_core: ^3.12.0
  # firebase_auth: ^5.5.0
  # # Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  riverpod: ^2.5.1
  
  # Environment
  flutter_dotenv: ^5.1.0
  
  # Utils
  permission_handler: ^11.3.1
  toastification: ^2.1.0
  shared_preferences: ^2.2.3
  loading_animation_widget: ^1.2.0+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env